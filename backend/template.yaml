AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  OFFTICKET backend — API Gateway (HTTP API) + Lambda (Node.js) + DynamoDB +
  Cognito (separate customer/owner pools) + S3 for vehicle photos.

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Description: >-
      CORS origins for the frontend, comma-separated with no spaces (e.g.
      https://offticket.in,https://www.offticket.in,https://main.xxxxx.amplifyapp.com).
      Access-Control-Allow-Origin can only ever echo back one exact origin,
      so the Lambda responses (see src/lib/response.js) pick whichever of
      these actually matches the incoming request.
    Default: "*"
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        VEHICLES_TABLE: !Ref VehiclesTable
        LISTINGS_TABLE: !Ref ListingsTable
        BOOKINGS_TABLE: !Ref BookingsTable
        DEMAND_POSTS_TABLE: !Ref DemandPostsTable
        BIDS_TABLE: !Ref BidsTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        PHOTOS_BUCKET: !Ref VehiclePhotosBucket
        ALLOWED_ORIGINS: !Join [',', !Ref AllowedOrigins]
        CUSTOMER_USER_POOL_ID: !Ref CustomerUserPoolV2
        OWNER_USER_POOL_ID: !Ref OwnerUserPoolV2

Resources:

  ########################
  # DynamoDB Tables
  ########################

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-users-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  VehiclesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-vehicles-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: vehicleId
          AttributeType: S
      KeySchema:
        - AttributeName: vehicleId
          KeyType: HASH

  ListingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-listings-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: listingId
          AttributeType: S
        - AttributeName: routeKey
          AttributeType: S
        - AttributeName: departureDate
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: listingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RouteIndex
          KeySchema:
            - AttributeName: routeKey
              KeyType: HASH
            - AttributeName: departureDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: OwnerListingsIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  BookingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-bookings-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bookingId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: bookingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerBookingsIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: OwnerBookingsIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DemandPostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-demand-posts-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: demandPostId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: routeKey
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: demandPostId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OpenPostsIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RouteIndex
          KeySchema:
            - AttributeName: routeKey
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CustomerPostsIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Streams enabled so BroadcastBidUpdateFunction can push realtime updates
  # the moment a bid is created or its status changes (accepted/rejected).
  BidsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-bids-${Stage}
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: bidId
          AttributeType: S
        - AttributeName: demandPostId
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: bidId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DemandPostBidsIndex
          KeySchema:
            - AttributeName: demandPostId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: OwnerBidsIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # WebSocket connections. demandPostId is sparse (unset until the client
  # sends "subscribe"), so newly-connected-but-not-yet-subscribed clients
  # simply don't show up in DemandPostConnectionsIndex yet.
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub offticket-connections-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: demandPostId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DemandPostConnectionsIndex
          KeySchema:
            - AttributeName: demandPostId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ########################
  # S3 — vehicle photos & documents
  ########################

  VehiclePhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub offticket-vehicle-photos-${Stage}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Ref AllowedOrigins
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ['*']
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ########################
  # Cognito — separate pools for owners and customers
  # Email-based sign-in/verification — Cognito sends verification codes via
  # its own default email sender, no SNS/SMS setup required.
  ########################

  # Logical IDs suffixed V2: UsernameAttributes is immutable on
  # AWS::Cognito::UserPool, so switching from phone_number to email requires
  # brand-new pools (new logical IDs) rather than an in-place update.
  CustomerUserPoolV2:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub offticket-customers-${Stage}
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true

  CustomerUserPoolClientV2:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub offticket-customers-web-${Stage}
      UserPoolId: !Ref CustomerUserPoolV2
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      GenerateSecret: false

  OwnerUserPoolV2:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub offticket-owners-${Stage}
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true

  OwnerUserPoolClientV2:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub offticket-owners-web-${Stage}
      UserPoolId: !Ref OwnerUserPoolV2
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      GenerateSecret: false

  ########################
  # API Gateway (HTTP API) with per-pool JWT authorizers
  ########################

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders: [Content-Type, Authorization]
        AllowMethods: [GET, POST, PUT, OPTIONS]
      Auth:
        Authorizers:
          CustomerAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CustomerUserPoolV2}
              audience: [!Ref CustomerUserPoolClientV2]
            IdentitySource: $request.header.Authorization
          OwnerAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${OwnerUserPoolV2}
              audience: [!Ref OwnerUserPoolClientV2]
            IdentitySource: $request.header.Authorization

  ########################
  # WebSocket API — realtime bid updates
  ########################

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub offticket-realtime-${Stage}
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnConnectFunction.Arn}/invocations

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketConnectIntegration}

  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnDisconnectFunction.Arn}/invocations

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketDisconnectIntegration}

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketSubscribeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnSubscribeFunction.Arn}/invocations

  WebSocketSubscribeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: subscribe
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketSubscribeIntegration}

  WebSocketSubscribePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnSubscribeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - WebSocketConnectRoute
      - WebSocketDisconnectRoute
      - WebSocketSubscribeRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: !Ref Stage

  ########################
  # Lambda functions
  ########################

  SearchListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/listings/search.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref ListingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /listings
            Method: GET

  GetListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/listings/getOne.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref ListingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /listings/{id}
            Method: GET

  CreateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/listings/create.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ListingsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref VehiclesTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /listings
            Method: POST
            Auth:
              Authorizer: OwnerAuthorizer

  CreateBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bookings/create.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref BookingsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ListingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /bookings
            Method: POST
            Auth:
              Authorizer: CustomerAuthorizer

  ConfirmBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bookings/confirm.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref BookingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /bookings/{id}/confirm
            Method: PUT
            Auth:
              Authorizer: OwnerAuthorizer

  GetUserBookingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/users/getBookings.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref BookingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/{id}/bookings
            Method: GET

  GetUserListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/users/getListings.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref ListingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/{id}/listings
            Method: GET

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/stats/get.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref BookingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats
            Method: GET

  PresignUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/uploads/presign.handler
      Policies:
        - S3CrudPolicy: { BucketName: !Ref VehiclePhotosBucket }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /uploads/presign
            Method: POST
            Auth:
              Authorizer: OwnerAuthorizer

  ########################
  # Demand posts (customer requests) + blind bidding
  ########################

  CreateDemandPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/demandPosts/create.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts
            Method: POST
            Auth:
              Authorizer: CustomerAuthorizer

  SearchDemandPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/demandPosts/search.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts
            Method: GET

  GetDemandPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/demandPosts/getOne.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts/{id}
            Method: GET

  CreateBidFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bids/create.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref BidsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts/{id}/bids
            Method: POST
            Auth:
              Authorizer: OwnerAuthorizer

  ListBidsForPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bids/listForPost.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref BidsTable }
        - DynamoDBReadPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts/{id}/bids
            Method: GET
            Auth:
              Authorizer: CustomerAuthorizer

  GetMyBidFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bids/getMine.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref BidsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts/{id}/bids/mine
            Method: GET
            Auth:
              Authorizer: OwnerAuthorizer

  AcceptBidFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bids/accept.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref BidsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DemandPostsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref BookingsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /demand-posts/{id}/bids/{bidId}/accept
            Method: PUT
            Auth:
              Authorizer: CustomerAuthorizer

  GetUserDemandPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/users/getDemandPosts.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref DemandPostsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/{id}/demand-posts
            Method: GET

  GetUserPlacedBidsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/users/getPlacedBids.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref BidsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /users/{id}/placed-bids
            Method: GET

  ########################
  # WebSocket realtime functions
  ########################

  OnConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/realtime/onConnect.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }

  OnDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/realtime/onDisconnect.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }

  OnSubscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/realtime/onSubscribe.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }

  BroadcastBidUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/realtime/broadcastBidUpdate.handler
      Timeout: 15
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref ConnectionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:DescribeStream
                - dynamodb:ListStreams
              Resource: !GetAtt BidsTable.StreamArn
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Stage}/POST/@connections/*
      Events:
        BidsStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt BidsTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10

Outputs:
  ApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  WebSocketUrl:
    Description: WebSocket URL for realtime bid updates (connect with ?token=<idToken>)
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  CustomerUserPoolId:
    Value: !Ref CustomerUserPoolV2
  CustomerUserPoolClientId:
    Value: !Ref CustomerUserPoolClientV2
  OwnerUserPoolId:
    Value: !Ref OwnerUserPoolV2
  OwnerUserPoolClientId:
    Value: !Ref OwnerUserPoolClientV2
  VehiclePhotosBucketName:
    Value: !Ref VehiclePhotosBucket
